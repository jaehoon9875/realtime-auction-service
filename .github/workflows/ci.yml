name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"

jobs:
  build-and-test:
    name: ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # settings.gradle.kts에 등록된 모듈만 포함 — 서비스 추가 시 함께 등록
          - service: api-gateway
            path: services/api-gateway
            gradle_task: :services:api-gateway
          - service: user-service
            path: services/user-service
            gradle_task: :services:user-service
          # - service: auction-service
          #   path: services/auction-service
          #   gradle_task: :services:auction-service
          # - service: bid-service
          #   path: services/bid-service
          #   gradle_task: :services:bid-service
          # - service: notification-service
          #   path: services/notification-service
          #   gradle_task: :services:notification-service
          # - service: auction-streams
          #   path: streams/auction-streams
          #   gradle_task: :streams:auction-streams
      fail-fast: false  # 한 서비스 실패해도 나머지는 계속 실행

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # build.gradle.kts 존재 여부로 서비스 구현 여부 판단
      - name: Check if service is implemented
        id: check
        run: |
          if [ -f ${{ matrix.path }}/build.gradle.kts ]; then
            echo "ready=true" >> $GITHUB_OUTPUT
          else
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "::notice::${{ matrix.service }}: build.gradle.kts not found, skipping checks."
          fi

      - name: Cache Gradle packages
        if: steps.check.outputs.ready == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ matrix.service }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-${{ matrix.service }}-
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        if: steps.check.outputs.ready == 'true'
        run: chmod +x gradlew

      # ── Build ───────────────────────────────
      - name: Build (Gradle)
        if: steps.check.outputs.ready == 'true'
        run: ./gradlew ${{ matrix.gradle_task }}:build -x test --stacktrace

      # ── Test ────────────────────────────────
      - name: Test (JUnit + Testcontainers)
        if: steps.check.outputs.ready == 'true'
        run: ./gradlew ${{ matrix.gradle_task }}:test --stacktrace
        env:
          SPRING_PROFILES_ACTIVE: test

      # ── Test Report ─────────────────────────
      - name: Upload test results
        if: steps.check.outputs.ready == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.service }}
          path: ${{ matrix.path }}/build/reports/tests/test/
