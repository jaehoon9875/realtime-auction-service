services:

  # ──────────────────────────────────────────────────────────────
  # Kafka (KRaft 모드 - Zookeeper 없이 동작, Kafka 3.x+)
  # 내부 통신: kafka:29092 / 외부(로컬 앱) 접속: localhost:9092
  # ──────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    hostname: kafka
    container_name: kafka
    ports:
      - "${KAFKA_EXTERNAL_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # PLAINTEXT: 컨테이너 내부 통신 / EXTERNAL: 로컬 앱 → Kafka 접속
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:9093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:${KAFKA_EXTERNAL_PORT:-9092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      # 로컬 단일 브로커 환경이므로 replication factor = 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # 토픽은 명시적으로 생성하도록 자동 생성 비활성화
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ──────────────────────────────────────────────────────────────
  # Schema Registry (Avro 스키마 중앙 버전 관리)
  # Debezium, 각 서비스의 Kafka Producer/Consumer가 스키마 검증에 사용
  # ──────────────────────────────────────────────────────────────
  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.0
    hostname: schema-registry
    container_name: schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${SCHEMA_REGISTRY_PORT:-8085}:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ──────────────────────────────────────────────────────────────
  # Kafka Connect + Debezium (CDC)
  # PostgreSQL WAL을 읽어 outbox_events → Kafka 토픽으로 발행
  # 컨테이너 기동 후 Connector 등록은 별도 REST API 호출 필요:
  #   curl -X POST http://localhost:8083/connectors -d @infra/debezium/auction-connector.json
  # ──────────────────────────────────────────────────────────────
  debezium:
    build:
      context: ./debezium
    hostname: debezium
    container_name: debezium
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      postgres-auction:
        condition: service_healthy
      postgres-bid:
        condition: service_healthy
    ports:
      - "${DEBEZIUM_PORT:-8083}:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:29092
      CONNECT_REST_ADVERTISED_HOST_NAME: debezium
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: debezium-connect-cluster
      # Kafka Connect 내부 상태 저장 토픽
      CONNECT_CONFIG_STORAGE_TOPIC: debezium-configs
      CONNECT_OFFSET_STORAGE_TOPIC: debezium-offsets
      CONNECT_STATUS_STORAGE_TOPIC: debezium-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      # Avro + Schema Registry 사용 (서비스 간 스키마 계약 강제)
      CONNECT_KEY_CONVERTER: io.confluent.connect.avro.AvroConverter
      CONNECT_VALUE_CONVERTER: io.confluent.connect.avro.AvroConverter
      CONNECT_KEY_CONVERTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CONNECT_VALUE_CONVERTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
      CONNECT_LOG4J_ROOT_LOGLEVEL: WARN
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/connectors"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ──────────────────────────────────────────────────────────────
  # PostgreSQL - Auction Service 전용 DB
  # wal_level=logical: Debezium CDC를 위한 WAL 논리 복제 활성화
  # ──────────────────────────────────────────────────────────────
  postgres-auction:
    image: postgres:17
    hostname: postgres-auction
    container_name: postgres-auction
    ports:
      - "${POSTGRES_AUCTION_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: auction
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # Debezium CDC를 위한 논리 복제 활성화
    command: >
      postgres
      -c wal_level=logical
      -c max_wal_senders=10
      -c max_replication_slots=10
    volumes:
      - postgres-auction-data:/var/lib/postgresql/data
      - ./init-scripts/auction-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d auction"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ──────────────────────────────────────────────────────────────
  # PostgreSQL - Bid Service 전용 DB
  # wal_level=logical: Debezium CDC를 위한 WAL 논리 복제 활성화
  # ──────────────────────────────────────────────────────────────
  postgres-bid:
    image: postgres:17
    hostname: postgres-bid
    container_name: postgres-bid
    ports:
      - "${POSTGRES_BID_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: bid
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command: >
      postgres
      -c wal_level=logical
      -c max_wal_senders=10
      -c max_replication_slots=10
    volumes:
      - postgres-bid-data:/var/lib/postgresql/data
      - ./init-scripts/bid-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d bid"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ──────────────────────────────────────────────────────────────
  # PostgreSQL - User Service 전용 DB
  # User Service는 Debezium을 사용하지 않으므로 기본 설정
  # ──────────────────────────────────────────────────────────────
  postgres-user:
    image: postgres:17
    hostname: postgres-user
    container_name: postgres-user
    ports:
      - "${POSTGRES_USER_PORT:-5434}:5432"
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-user-data:/var/lib/postgresql/data
      - ./init-scripts/user-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d user_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ──────────────────────────────────────────────────────────────
  # Redis (Notification Service WebSocket 세션 공유)
  # Notification Service가 스케일아웃될 때 세션 정보 공유에 사용
  # ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    hostname: redis
    container_name: redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────
  # Kafka UI (로컬 개발 전용 - 토픽/메시지/Connector 모니터링)
  # http://localhost:9000 에서 접속
  # ──────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    ports:
      - "${KAFKA_UI_PORT:-9000}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: debezium
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://debezium:8083

volumes:
  kafka-data:
  postgres-auction-data:
  postgres-bid-data:
  postgres-user-data:
  redis-data:
