spring:
  application:
    name: auction-service
  jackson:
    serialization:
      write-dates-as-timestamps: false
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_AUCTION_PORT}/${POSTGRES_AUCTION_DB_NAME}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations:
      - classpath:db/migration
app:
  auction:
    schedule:
      # 예약 경매 PENDING→ONGOING 스케줄 태스크 (통합 테스트에서는 integration 프로파일로 비활성화)
      enabled: ${AUCTION_SCHEDULE_ENABLED:true}
      pending-to-ongoing-ms: ${AUCTION_PENDING_TO_ONGOING_MS:20000}
      # endsAt 경과 ONGOING→CLOSED (기본 30초 주기, docs/architecture.md 와 정합)
      ongoing-to-closed-ms: ${AUCTION_ONGOING_TO_CLOSED_MS:30000}
  # Gateway가 붙여 보내는 내부 요청 토큰 검증용 설정.
  security:
    internal-request-header-name: ${INTERNAL_REQUEST_HEADER_NAME:X-Internal-Request-Token}
    # 빈 문자열 기본값 의도적 사용: 로컬/테스트 환경에서 Gateway 없이 단독 기동 시 시크릿 미설정 허용.
    # 운영 환경 fail-fast는 InternalRequestTokenFilter@PostConstruct가 프로파일 기반으로 처리.
    internal-request-secret: ${INTERNAL_REQUEST_SECRET:}
  auction-streams:
    # auction-streams 서비스 URL
    base-url: ${AUCTION_STREAMS_BASE_URL}
    # auction-streams 서비스 연결 시간 제한
    connect-timeout-ms: ${AUCTION_STREAMS_CONNECT_TIMEOUT:2000}
    read-timeout-ms: ${AUCTION_STREAMS_READ_TIMEOUT:3000}

resilience4j:
  retry:
    instances:
      auction-streams:
        # 총 시도 횟수(최초 1회 + 재시도 2회 = 최대 3회)
        max-attempts: 3
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        # 4xx 계열은 클라이언트 입력/요청 문제이므로 재시도하지 않는다.
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException

