# 통합 테스트(Testcontainers)에서는 스케줄러가 DB를 주기적으로 건드리지 않도록 비활성화
# AuctionStreamsClient 는 @MockitoBean 으로 대체되므로 실제 연결 없음. 바인딩 검증용 더미 값 사용.
SWAGGER_ENABLED: false

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          # integration 프로파일은 user-service JWKS에 연결하지 않음 (JwtDecoder는 테스트에서 Mock)
          jwk-set-uri: http://localhost:9999/.well-known/jwks.json

app:
  auction:
    schedule:
      enabled: false
  auction-streams:
    base-url: http://dummy-auction-streams
