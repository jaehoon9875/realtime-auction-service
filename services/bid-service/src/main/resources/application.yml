spring:
  application:
    name: bid-service
  jackson:
    serialization:
      write-dates-as-timestamps: false
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_BID_PORT}/${POSTGRES_BID_DB_NAME}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations:
      - classpath:db/migration

app:
  # Gateway가 붙여 보내는 내부 요청 토큰 검증용 설정.
  security:
    internal-request-header-name: ${INTERNAL_REQUEST_HEADER_NAME:X-Internal-Request-Token}
    # 빈 문자열 기본값 의도적 사용: 로컬/테스트 환경에서 Gateway 없이 단독 기동 시 시크릿 미설정 허용.
    # 운영 환경 fail-fast는 InternalRequestTokenFilter@PostConstruct가 프로파일 기반으로 처리.
    internal-request-secret: ${INTERNAL_REQUEST_SECRET:}
  auction-service:
    base-url: ${AUCTION_SERVICE_BASE_URL:http://localhost:8081}
    connect-timeout-ms: ${AUCTION_SERVICE_CONNECT_TIMEOUT:2000}
    read-timeout-ms: ${AUCTION_SERVICE_READ_TIMEOUT:3000}
  auction-streams:
    base-url: ${AUCTION_STREAMS_BASE_URL:http://localhost:8085}
    connect-timeout-ms: ${AUCTION_STREAMS_CONNECT_TIMEOUT:2000}
    read-timeout-ms: ${AUCTION_STREAMS_READ_TIMEOUT:3000}

resilience4j:
  retry:
    instances:
      auction-service:
        max-attempts: 3
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException
      auction-streams:
        max-attempts: 3
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException
  circuitbreaker:
    instances:
      auction-service:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        # 4xx는 서버가 정상적으로 응답한 것이므로 CB 실패로 집계하지 않는다.
        # 비즈니스 오류(404 경매 없음, 422 검증 실패 등)가 쌓여 CB가 열리는 오동작 방지.
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException
      auction-streams:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        # 4xx는 서버가 정상적으로 응답한 것이므로 CB 실패로 집계하지 않는다.
        # 비즈니스 오류(404 경매 없음, 422 검증 실패 등)가 쌓여 CB가 열리는 오동작 방지.
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException
