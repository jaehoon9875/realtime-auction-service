spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # User Service (README 포트: 8083)
        - id: user-service
          uri: ${USER_SERVICE_URI:http://localhost:8083}
          predicates:
            - Path=/api/users/**

        # Auction Service — M3 이후 구현 시 확인
        - id: auction-service
          uri: ${AUCTION_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/auctions/**

        # Bid Service — M4 이후 구현 시 확인
        - id: bid-service
          uri: ${BID_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/api/bids/**

        # Notification Service — M6 이후 구현 시 확인
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URI:http://localhost:8084}
          predicates:
            - Path=/ws/**

server:
  port: ${SERVER_PORT:8080}
