spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # User Service (README 포트: 8083)
        # 외부: /api/users/** → 내부: /users/** (첫 세그먼트 api 제거)
        - id: user-service
          uri: ${USER_SERVICE_URI}
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=1

        # Auction Service
        # 외부: /api/auctions/** → 내부: /auctions/** (첫 세그먼트 api 제거)
        # AddRequestHeader: Gateway를 경유한 요청임을 auction-service가 검증할 수 있도록
        # X-Internal-Request-Token 헤더에 사전 공유 시크릿을 주입한다.
        # auction-service의 app.security.internal-request-secret 값과 반드시 일치해야 함.
        # 참고: docs/internal-service-auth.md
        - id: auction-service
          uri: ${AUCTION_SERVICE_URI}
          predicates:
            - Path=/api/auctions/**
          filters:
            - StripPrefix=1
            - SetRequestHeader=X-Internal-Request-Token, ${INTERNAL_REQUEST_SECRET}

        # Bid Service — M4 이후 구현 시 확인
        # 외부: /api/bids/** → 내부: /bids/** 가정
        - id: bid-service
          uri: ${BID_SERVICE_URI}
          predicates:
            - Path=/api/bids/**
          filters:
            - StripPrefix=1
            - SetRequestHeader=X-Internal-Request-Token, ${INTERNAL_REQUEST_SECRET}

        # Notification Service — M6 이후 구현 시 확인
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URI}
          predicates:
            - Path=/ws/**

        # API 문서 프록시 — Gateway 통합 Swagger UI 집계용
        # X-Forwarded-Prefix: /api 주입 → 각 서비스가 servers URL을 /api 로 동적 생성
        - id: user-service-docs
          uri: ${USER_SERVICE_URI}
          predicates:
            - Path=/user-service/v3/api-docs
          filters:
            - SetPath=/v3/api-docs
            - AddRequestHeader=X-Forwarded-Prefix, /api

        - id: auction-service-docs
          uri: ${AUCTION_SERVICE_URI}
          predicates:
            - Path=/auction-service/v3/api-docs
          filters:
            - SetPath=/v3/api-docs
            - AddRequestHeader=X-Forwarded-Prefix, /api

        - id: bid-service-docs
          uri: ${BID_SERVICE_URI}
          predicates:
            - Path=/bid-service/v3/api-docs
          filters:
            - SetPath=/v3/api-docs
            - AddRequestHeader=X-Forwarded-Prefix, /api
server:
  port: ${API_GATEWAY_PORT:8080}
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    # 각 서비스 api-docs를 Gateway 프록시 경로로 지정 (CORS 없이 동일 오리진 처리)
    urls:
      - name: user-service
        url: /user-service/v3/api-docs
      - name: auction-service
        url: /auction-service/v3/api-docs
      - name: bid-service
        url: /bid-service/v3/api-docs
  api-docs:
    # Gateway 자체는 문서화할 컨트롤러가 없으므로 비활성화
    enabled: false
app:
  security:
    # Gateway가 받는 외부 경로 (StripPrefix 전). user-service의 /users/* 와 1:1 대응
    public-endpoints:
      - /api/users/signup
      - /api/users/login
      - /api/users/refresh
      - /actuator/health
  jwt:
    public-key: ${JWT_PUBLIC_KEY}
